name: Build and deploy Frontend to Azure Web App - project-assistant

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Node.js environment
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: 'projectassistant/frontend/package-lock.json'

      # Install dependencies in 'projectassistant/frontend'
      - name: Install dependencies
        run: npm ci
        working-directory: projectassistant/frontend

      # Build the project in 'projectassistant/frontend'
      - name: Build project
        run: NODE_OPTIONS=--max_old_space_size=8192 npm run build
        working-directory: projectassistant/frontend

      # Verify that the 'static' directory has been created successfully
      - name: Verify static directory
        run: ls -al projectassistant/static || echo "Static directory not found!"

      # Create a zip file for deployment from the 'static' folder
      - name: Create deployment zip
        run: |
          cd projectassistant/static
          zip -r ../../static.zip .

      # Upload the deployment package as an artifact for later use
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v3
        with:
          name: frontend-app
          path: static.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write  # This is required for requesting the JWT

    steps:
      # Download the artifact created in the build job
      - name: Download artifact from build job
        uses: actions/download-artifact@v3
        with:
          name: frontend-app

      # Unzip the downloaded artifact
      - name: Unzip artifact for deployment
        run: unzip static.zip -d projectassistant/static

      # Login to Azure using Service Principal
      - name: Login to Azure using Service Principal
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Set Azure Subscription explicitly
      - name: Set Azure Subscription explicitly
        run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Deploy to Azure Web App with the 'clean' flag to ensure no conflicts
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        id: deploy-to-webapp
        with:
          app-name: 'project-assistant'
          slot-name: 'dev'  # Set to 'dev' since you mentioned creating a dev environment
          package: projectassistant/static
          clean: true  # Clean the destination before deploying to avoid conflicts
