name: Build and Deploy Frontend

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18.x
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    - name: Install Dependencies
      run: npm ci

    - name: Build Project
      run: NODE_OPTIONS=--max_old_space_size=8192 npm run build

    # Debugging Step: List all files in the entire project directory
    - name: List entire project directory
      run: ls -R ../

    # Debugging Step: List contents of static directory
    - name: List static directory
      run: ls -al ../static

    # Create a ZIP file from the static directory
    - name: Zip static directory
      run: zip -r ../static.zip ../static

    # List ZIP file to verify it's present
    - name: List zip file
      run: ls -al ../

    # Deploy the ZIP file to Azure Web App
    - name: Deploy to Azure Web App
      if: github.ref == 'refs/heads/main'
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'project-assistant'  # Replace with your Azure App Service name
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ../static.zip
