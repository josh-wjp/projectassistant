name: Build and Deploy Frontend

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18.x
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    - name: Install Dependencies
      run: npm ci

    - name: Build Project
      run: |
        echo "Starting build process..."
        NODE_OPTIONS=--max_old_space_size=8192 npm run build
        echo "Build process completed."

    # Debugging Step: List the entire project directory to see if static was created anywhere
    - name: List entire project directory after build
      run: ls -R ../

    # Debugging Step: Verify that static directory exists at root level
    - name: List static directory contents
      run: ls -al ../static || echo "Static directory not found!"

    # Deploy the static directory to Azure Web App
    - name: Deploy to Azure Web App
      if: github.ref == 'refs/heads/main'
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'project-assistant'  # Replace with your Azure App Service name
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ../static
