name: Build and deploy Frontend to Azure Web App - project-assistant

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Node.js environment without caching for now
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      # Install dependencies in 'frontend' folder using npm install instead of npm ci
      - name: Install dependencies
        run: npm install --prefix projectassistant/frontend

      # Build the project in 'frontend' folder
      - name: Build project
        run: NODE_OPTIONS=--max_old_space_size=8192 npm run build --prefix projectassistant/frontend

      # Verify the static directory exists
      - name: Verify static directory
        run: ls -al projectassistant/static || echo "Static directory not found!"

      # Create a deployment zip from the static folder
      - name: Create deployment zip
        run: |
          cd projectassistant/static
          zip -r ../../static.zip .

      # Upload the deployment package as an artifact
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v3
        with:
          name: frontend-app
          path: projectassistant/static.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write  # Required for requesting the JWT

    steps:
      # Download the artifact from the build job
      - name: Download artifact from build job
        uses: actions/download-artifact@v3
        with:
          name: frontend-app

      # Unzip the downloaded artifact in 'projectassistant' directory
      - name: Unzip artifact for deployment
        run: unzip static.zip -d projectassistant

      # Login to Azure using Service Principal
      - name: Login to Azure using Service Principal
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Set Azure Subscription explicitly
      - name: Set Azure Subscription
        run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Deploy to Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        id: deploy-to-webapp
        with:
          app-name: 'project-assistant'
          slot-name: 'production'
          package: projectassistant
